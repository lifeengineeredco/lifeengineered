<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Life Engineered</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;

    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

.container{
    display:flex;
    flex-direction:column;
    align-items:center;
}

.circle{

    width:290px;
    height:290px;

    border-radius:50%;

    background:#1B1A1A;

    transition:
        background 700ms ease,
        box-shadow 700ms ease;
}

.circle.active{

    background:#1C9915;

    box-shadow:
        0 0 20px rgba(28,153,21,.30),
        0 0 70px rgba(28,153,21,.28),
        0 0 140px rgba(28,153,21,.18);
}

.text{

    margin-top:48px;

    color:white;

    text-align:center;

    font-size:28px;
    line-height:1.55;

    font-weight:400;
}

.line1{

    opacity:0;

    animation:
        fadeIn .7s ease forwards;

    animation-delay:.8s;
}

.line2{

    margin-top:8px;

    display:flex;
    justify-content:center;
    gap:.35em;
}

.word{

    display:inline-block;

    opacity:0;

    transform:translateY(35px);

}

.word.show{

    animation:slideUp .6s cubic-bezier(.2,.8,.2,1) forwards;
}

@keyframes fadeIn{

    from{
        opacity:0;
    }

    to{
        opacity:1;
    }

}

@keyframes slideUp{

    from{
        opacity:0;
        transform:translateY(35px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

</style>
</head>

<body>

<div class="container">

    <div class="circle" id="circle"></div>

    <div class="text">

        <div class="line1">
            You don't see the engineering.
        </div>

        <div class="line2">

            <span class="word">You</span>
            <span class="word">just</span>
            <span class="word">live.</span>

        </div>

    </div>

</div>

<script>

const words=document.querySelectorAll(".word");
const circle=document.getElementById("circle");

// Start drugiej linijki
setTimeout(()=>{

    words.forEach((word,index)=>{

        setTimeout(()=>{

            word.classList.add("show");

        },index*170);

    });

},1800);


// Zapalenie kółka
setTimeout(()=>{

    circle.classList.add("active");

},2600);

</script>

</body>
</html>
