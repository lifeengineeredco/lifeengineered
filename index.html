<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Engineered</title>

<style>

body{
    margin:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family: Calibri, Arial, sans-serif;
}

.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
}

.title{
    color:#f5f5f5;
    font-size:3rem;
    font-weight:700;
    font-style:italic;
    margin:0;
}

.dot{
    width:22px;
    height:22px;
    background:#00ff66;
    border-radius:50%;
    box-shadow:
        0 0 10px #00ff66,
        0 0 30px #00ff66;
}

.subtitle{
    color:#d0d0d0;
    font-size:1rem;
    margin:0;
    letter-spacing:0.05em;
}

</style>

</head>

<body>

<div class="container">
    <h1 class="title">Life Engineered</h1>

    <div class="dot"></div>

    <p class="subtitle">Less friction. More life.</p>
</div>

</body>
</html>
